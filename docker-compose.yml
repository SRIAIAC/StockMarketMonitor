services:
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # Mounted below at /app/data, not the whole /app — a named volume
      # mounted over the entire app directory gets pre-populated from the
      # image on first run and then permanently shadows the code with that
      # stale snapshot on every rebuild.
      - DATABASE_URL=sqlite:////app/data/market_monitor.db
      # `.env`'s OLLAMA_BASE_URL=http://localhost:11434 is correct for
      # running the backend directly on the host, but inside this container
      # "localhost" means the container itself, not the machine running
      # `ollama serve` — every Ollama call silently failed (connection
      # refused) and every AI one-liner fell through to the same generic
      # per-category rule-based text, which is why e.g. every Dividend
      # action across different companies showed identical wording. Override
      # to the host machine via Docker's special DNS name (works out of the
      # box on Docker Desktop; extra_hosts below makes it resolve on Linux
      # Docker Engine too, e.g. the GCP VM — where nothing is listening on
      # 11434 anyway, so it just correctly falls through to tier 3, same as
      # before, no regression there).
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - backend_data:/app/data

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
      # Only needed if frontend/backend won't share a hostname+port (e.g.
      # deploying each separately to the cloud) — for this same-host
      # docker-compose setup the frontend already falls back to
      # http://<hostname>:8000 automatically, so this can stay unset here.
      # args:
      #   VITE_API_BASE_URL: https://your-backend-url
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  backend_data:
